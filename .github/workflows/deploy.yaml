name: Deploy to Releases
permissions:
  contents: write
on:
  push:
    branches:
      - rewrite

jobs:
  check_version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_publish: ${{ steps.check_version.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Version from Project File
        id: get-version
        run: |
          echo "version=$(grep -oE '<Version>[^<]+' ETS2LA/ETS2LA.csproj | sed 's/<Version>//')" >> $GITHUB_OUTPUT

      - name: Check whether release tag already exists
        id: check_version
        run: |
          TAG="v${{ steps.get-version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  pack-windows:
    name: Pack & Upload Velopack (Windows)
    needs: check_version
    if: needs.check_version.outputs.should_publish == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: |
          .\publish.bat

      - name: Install vpk tool
        run: dotnet tool install -g vpk

      - name: Pack & Upload Velopack
        shell: pwsh
        run: |
          $vpk = "$env:USERPROFILE\.dotnet\tools\vpk.exe"
          & $vpk pack `
            --channel win-beta `
            --packId ETS2LA `
            --packVersion ${{ needs.check_version.outputs.version }} `
            --packDir .\publish `
            --mainExe ETS2LA.exe `
            --msi `
            -f net10-x64-desktop
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETS2LA-Windows
          path: Releases/**

  pack-linux:
    name: Pack & Upload Velopack (Linux)
    needs: check_version
    if: needs.check_version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: |
          ./publish.sh

      - name: Install vpk tool
        run: |
          dotnet tool install -g vpk

      - name: Pack & Upload Velopack
        run: |
          VPK="$HOME/.dotnet/tools/vpk"
          $VPK pack \
            --channel linux-beta \
            --packId ETS2LA \
            --packVersion ${{ needs.check_version.outputs.version }} \
            --packDir ./publish \
            --mainExe ETS2LA \
            --icon ./ETS2LA.UI/Assets/logo.ico \
            --packTitle ETS2LA \
            --releaseNotes ./ETS2LA/ReleaseNotes.md

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETS2LA-Linux
          path: Releases/**

  release:
    name: Create Release
    needs:
      - check_version
      - build_windows
      - build_linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Artifacts
        id: download-artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # =========================
      # CREATE TAG (IMPORTANT)
      # =========================
      - name: Create Tag
        id: create-tag
        run: |
          git tag v${{ needs.check_version.outputs.version }}
          git push origin v${{ needs.check_version.outputs.version }}

      # =========================
      # GITHUB RELEASE
      # =========================
      - name: GitHub Release
        id: github-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check_version.outputs.version }}
          files: artifacts/**/*

      # =========================
      # PUSH TO CNB
      # =========================
      - name: Push CNB
        id: push-cnb
        run: |
          git remote add cnb https://${{ secrets.CNB_USERNAME }}:${{ secrets.CNB_TOKEN }}@cnb.cool/ETS2LA-CN/Euro-Truck-Simulator-2-Lane-Assist.git
          git push cnb rewrite
          git push cnb --tags

      # =========================
      # UPLOAD TO CNB (FIXED)
      # =========================
      - name: Upload CNB Assets
        id: upload-cnb-assets
        run: |
          for i in {1..20}; do
            stop_marker="cnb-attachments-output-$RANDOM-$RANDOM"
            echo "::stop-commands::$stop_marker"

            set +e
            docker run --rm \
              -e CNB_TOKEN="${{ secrets.CNB_TOKEN }}" \
              -e CNB_API_ENDPOINT="https://api.cnb.cool" \
              -e CNB_WEB_ENDPOINT="https://cnb.cool" \
              -e CNB_REPO_SLUG="ETS2LA-CN/Euro-Truck-Simulator-2-Lane-Assist" \
              -e PLUGIN_TAG="v${{ needs.check_version.outputs.version }}" \
              -e PLUGIN_ATTACHMENTS="artifacts/**/*" \
              -v ${{ github.workspace }}:/work \
              -w /work \
              cnbcool/attachments:latest
            status=$?
            set -e

            echo "::$stop_marker::"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            echo "CNB release is not ready yet, retrying in 15 seconds... ($i/20)"
            sleep 15
          done

          echo "Failed to upload CNB assets after waiting for the CNB release."
          exit 1
